{% extends "base.html" %}
{% block title %}Novo Usuário - Reserva Tablets{% endblock %}
{% block content %}
<div class="topbar">
  <div>
    <h1>Novo Usuário</h1>
    <div class="subtitle">Cadastre chefes, administradores ou professores</div>
  </div>
</div>

<div class="panel">
  <form method="POST">
    <div class="form-grid">
      <div class="form-group">
        <label>Nome completo</label>
        <input type="text" name="nome" value="{{ form.nome or '' }}" required>
      </div>
      <div class="form-group">
        <label>Usuário (login)</label>
        <input type="text" name="username" value="{{ form.username or '' }}" required>
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" name="senha" required>
      </div>
      <div class="form-group">
        <label>Perfil</label>
        <select name="role" required>
          {% for r in roles %}
          <option value="{{ r }}" {% if form.role == r %}selected{% endif %}>{{ role_labels[r] }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <button type="submit" class="btn btn-primary">Cadastrar Usuário</button>
    <a href="{{ url_for('listar_usuarios') }}" class="btn">Cancelar</a>
  </form>
</div>
{% endblock %}
