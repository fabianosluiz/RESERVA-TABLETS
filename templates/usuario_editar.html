{% extends "base.html" %}
{% block title %}Editar Usuário - Reserva Tablets{% endblock %}
{% block content %}
<div class="topbar">
  <div>
    <h1>Editar Usuário</h1>
    <div class="subtitle">Atualize os dados de {{ usuario.nome }}</div>
  </div>
</div>

<div class="panel">
  <form method="POST">
    <div class="form-grid">
      <div class="form-group">
        <label>Nome completo</label>
        <input type="text" name="nome" value="{{ usuario.nome }}" required>
      </div>
      <div class="form-group">
        <label>Usuário (login)</label>
        <input type="text" name="username" value="{{ usuario.username }}" required>
      </div>
      <div class="form-group">
        <label>Nova senha <span style="color:var(--text-muted);font-size:0.78rem;">(deixe em branco para manter)</span></label>
        <input type="password" name="nova_senha" placeholder="••••••••">
      </div>
      <div class="form-group">
        <label>Perfil</label>
        <select name="role" required>
          {% for r in roles %}
          <option value="{{ r }}" {% if usuario.role == r %}selected{% endif %}>{{ role_labels[r] }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <button type="submit" class="btn btn-primary">Salvar Alterações</button>
    <a href="{{ url_for('listar_usuarios') }}" class="btn">Cancelar</a>
  </form>
</div>
{% endblock %}
